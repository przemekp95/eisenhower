name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      sync_pr_mode:
        description: Run only the required sync-PR checks
        required: false
        type: boolean
        default: false
  pull_request:
    branches:
      - dev
      - master
  push:
    branches:
      - dev
      - master

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  security-lint:
    name: security-lint
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy scan
        id: trivy-scan
        shell: bash
        run: |
          set +e
          mkdir -p "$HOME/.cache/trivy"
          docker run --rm \
            -w /workdir \
            -v "$PWD:/workdir" \
            -v "$HOME/.cache/trivy:/root/.cache/" \
            aquasec/trivy:0.63.0 fs \
            --config /workdir/trivy.yaml \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format sarif \
            --output /workdir/trivy-results.sarif \
            /workdir
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload SARIF
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Enforce Trivy gate
        if: ${{ steps.trivy-scan.outputs.exit_code != '0' }}
        run: |
          echo "::error::Trivy detected HIGH or CRITICAL findings."
          exit 1

  test-backend-node:
    name: test-backend-node
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend-node/package-lock.json

      - name: Install dependencies
        working-directory: backend-node
        run: npm ci

      - name: Build
        working-directory: backend-node
        run: npm run build

      - name: Test with coverage
        working-directory: backend-node
        env:
          MONGODB_URI: mongodb://localhost:27017/eisenhower-test
          JWT_SECRET: ci-test-secret
        run: npm run test:coverage

  test-frontend:
    name: test-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Test with coverage
        working-directory: web
        run: npm run test:coverage

  test-frontend-e2e:
    if: ${{ !inputs.sync_pr_mode }}
    name: test-frontend-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend-node/package-lock.json
            web/package-lock.json

      - name: Install backend dependencies
        working-directory: backend-node
        run: npm ci

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run frontend E2E smoke suite
        working-directory: web
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/output/playwright/report
            web/output/playwright/test-results
          if-no-files-found: ignore

  test-frontend-integration:
    if: ${{ !inputs.sync_pr_mode }}
    name: test-frontend-integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend-node/package-lock.json
            web/package-lock.json

      - name: Install backend dependencies
        working-directory: backend-node
        run: npm ci

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Run frontend integration suite
        working-directory: web
        run: npm run test:integration

  test-backend-ai:
    name: test-backend-ai
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend-ai/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend-ai
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests with coverage
        working-directory: backend-ai
        env:
          PYTHONPATH: ${{ github.workspace }}/backend-ai
        run: python -m pytest

  test-mobile:
    name: test-mobile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile/eisenhower-matrix/package-lock.json

      - name: Install dependencies
        working-directory: mobile/eisenhower-matrix
        run: npm ci

      - name: Test with coverage
        working-directory: mobile/eisenhower-matrix
        run: npm run test:coverage

  test-mobile-native-android:
    if: ${{ !inputs.sync_pr_mode }}
    name: test-mobile-native-android
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_APP_ORIGIN_URL: ${{ vars.EXPO_PUBLIC_APP_ORIGIN_URL }}
      EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_AI_API_URL: ${{ vars.EXPO_PUBLIC_AI_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile/eisenhower-matrix/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006" \
            "cmake;3.30.5"

      - name: Install dependencies
        working-directory: mobile/eisenhower-matrix
        run: npm ci

      - name: Validate mobile public endpoints
        shell: bash
        run: |
          trim() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          is_public_http_url() {
            local value
            value="$(trim "$1")"
            [[ "$value" =~ ^https?:// ]] || return 1
            [[ "$value" == *,* ]] && return 1
            [[ "$value" =~ ^https?://(localhost|127\.0\.0\.1|10\.0\.2\.2|\[::1\])([/:]|$) ]] && return 1
            return 0
          }

          api_url="$(trim "${EXPO_PUBLIC_API_URL:-}")"
          ai_url="$(trim "${EXPO_PUBLIC_AI_API_URL:-}")"
          app_origin="$(trim "${EXPO_PUBLIC_APP_ORIGIN_URL:-}")"

          if ! is_public_http_url "$api_url"; then
            echo "::error::EXPO_PUBLIC_API_URL repository variable is required and must be a public http(s) URL."
            exit 1
          fi

          if ! is_public_http_url "$ai_url"; then
            echo "::error::EXPO_PUBLIC_AI_API_URL repository variable is required and must be a public http(s) URL."
            exit 1
          fi

          if [[ -n "$app_origin" ]]; then
            if ! is_public_http_url "$app_origin"; then
              echo "::error::EXPO_PUBLIC_APP_ORIGIN_URL must be a public http(s) URL when provided."
              exit 1
            fi

            app_origin="${app_origin%/}"
          fi

          api_url="${api_url%/}"
          ai_url="${ai_url%/}"

          {
            echo "EXPO_PUBLIC_APP_ORIGIN_URL=$app_origin"
            echo "EXPO_PUBLIC_API_URL=$api_url"
            echo "EXPO_PUBLIC_AI_API_URL=$ai_url"
          } >> "$GITHUB_ENV"

      - name: Generate native Android project
        working-directory: mobile/eisenhower-matrix
        env:
          CI: "1"
          EXPO_NO_TELEMETRY: "1"
          NODE_ENV: production
        run: npx expo prebuild --platform android --no-install --clean

      - name: Android native release APK
        working-directory: mobile/eisenhower-matrix/android
        env:
          CI: "1"
          EXPO_NO_TELEMETRY: "1"
          NODE_ENV: production
        run: |
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          ./gradlew assembleRelease

      - name: Verify embedded mobile endpoints
        shell: bash
        run: |
          bundle_strings_file="$(mktemp)"
          unzip -p mobile/eisenhower-matrix/android/app/build/outputs/apk/release/app-release.apk assets/index.android.bundle | strings > "$bundle_strings_file"

          if grep -Eq 'http://(127\.0\.0\.1|localhost|10\.0\.2\.2)(:[0-9]+)?' "$bundle_strings_file"; then
            echo "::error::Release APK still contains loopback development endpoints."
            exit 1
          fi

          if ! grep -Fq "$EXPO_PUBLIC_API_URL" "$bundle_strings_file"; then
            echo "::error::Release APK does not contain the resolved task API URL."
            exit 1
          fi

          if ! grep -Fq "$EXPO_PUBLIC_AI_API_URL" "$bundle_strings_file"; then
            echo "::error::Release APK does not contain the resolved AI API URL."
            exit 1
          fi

      - name: Prepare APK artifact
        shell: bash
        run: |
          mkdir -p mobile/eisenhower-matrix/output
          cp \
            mobile/eisenhower-matrix/android/app/build/outputs/apk/release/app-release.apk \
            "mobile/eisenhower-matrix/output/eisenhower-matrix-android-release-${GITHUB_SHA::7}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eisenhower-matrix-android-apk-${{ github.sha }}
          path: mobile/eisenhower-matrix/output/*.apk
          if-no-files-found: error
          retention-days: 14
