name: CI

on:
  pull_request:
    branches:
      - dev
      - master
  push:
    branches:
      - dev
      - master

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  security-lint:
    name: security-lint
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy scan
        run: |
          mkdir -p "$HOME/.cache/trivy"
          docker run --rm \
            -w /workdir \
            -v "$PWD:/workdir" \
            -v "$HOME/.cache/trivy:/root/.cache/" \
            aquasec/trivy:0.63.0 fs \
            --config /workdir/trivy.yaml \
            --format sarif \
            --output /workdir/trivy-results.sarif \
            /workdir || true

      - name: Upload SARIF
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  test-backend-node:
    name: test-backend-node
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend-node/package-lock.json

      - name: Install dependencies
        working-directory: backend-node
        run: npm ci

      - name: Build
        working-directory: backend-node
        run: npm run build

      - name: Test with coverage
        working-directory: backend-node
        env:
          MONGODB_URI: mongodb://localhost:27017/eisenhower-test
          JWT_SECRET: ci-test-secret
        run: npm run test:coverage

  test-frontend:
    name: test-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Test with coverage
        working-directory: web
        run: npm run test:coverage

  test-frontend-e2e:
    name: test-frontend-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend-node/package-lock.json
            web/package-lock.json

      - name: Install backend dependencies
        working-directory: backend-node
        run: npm ci

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run frontend E2E smoke suite
        working-directory: web
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/output/playwright/report
            web/output/playwright/test-results
          if-no-files-found: ignore

  test-frontend-integration:
    name: test-frontend-integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend-node/package-lock.json
            web/package-lock.json

      - name: Install backend dependencies
        working-directory: backend-node
        run: npm ci

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Run frontend integration suite
        working-directory: web
        run: npm run test:integration

  test-backend-ai:
    name: test-backend-ai
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend-ai/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend-ai
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests with coverage
        working-directory: backend-ai
        env:
          PYTHONPATH: ${{ github.workspace }}/backend-ai
        run: python -m pytest

  test-mobile:
    name: test-mobile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile/eisenhower-matrix/package-lock.json

      - name: Install dependencies
        working-directory: mobile/eisenhower-matrix
        run: npm ci

      - name: Test with coverage
        working-directory: mobile/eisenhower-matrix
        run: npm run test:coverage

  test-mobile-native-android:
    name: test-mobile-native-android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile/eisenhower-matrix/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006" \
            "cmake;3.30.5"

      - name: Install dependencies
        working-directory: mobile/eisenhower-matrix
        run: npm ci

      - name: Generate native Android project
        working-directory: mobile/eisenhower-matrix
        env:
          CI: "1"
          EXPO_NO_TELEMETRY: "1"
          NODE_ENV: production
        run: npx expo prebuild --platform android --no-install --clean

      - name: Android native smoke build
        working-directory: mobile/eisenhower-matrix/android
        env:
          CI: "1"
          EXPO_NO_TELEMETRY: "1"
          NODE_ENV: production
        run: |
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          ./gradlew assembleDebug
