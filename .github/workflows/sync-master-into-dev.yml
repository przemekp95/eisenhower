name: Sync master into dev

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  sync-master-into-dev:
    name: sync-master-into-dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select sync strategy
        id: sync-strategy
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin dev master

          target_sha="$(git rev-parse origin/master)"
          dev_sha="$(git rev-parse origin/dev)"

          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
          echo "dev_sha=$dev_sha" >> "$GITHUB_OUTPUT"

          if git merge-base --is-ancestor origin/master origin/dev; then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            echo "reason=dev already contains origin/master" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git merge-base --is-ancestor origin/dev origin/master; then
            echo "mode=fast-forward" >> "$GITHUB_OUTPUT"
            echo "reason=origin/dev can be fast-forwarded to origin/master" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "mode=pull-request" >> "$GITHUB_OUTPUT"
          echo "reason=origin/dev advanced independently and requires a merge sync" >> "$GITHUB_OUTPUT"

      - name: Discover master CI run
        if: ${{ steps.sync-strategy.outputs.mode == 'fast-forward' }}
        id: master-ci-run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          target_sha="${{ steps.sync-strategy.outputs.target_sha }}"

          for _ in $(seq 1 30); do
            run_id="$(gh run list \
              --workflow ci.yml \
              --branch master \
              --event push \
              --json databaseId,headSha \
              --jq '[.[] | select(.headSha == "'"$target_sha"'")] | sort_by(.databaseId) | last | .databaseId // empty')"

            if [ -n "$run_id" ]; then
              echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep 5
          done

          echo "Could not find the push CI run for master SHA $target_sha."
          exit 1

      - name: Wait for required master checks
        if: ${{ steps.sync-strategy.outputs.mode == 'fast-forward' }}
        id: wait-master-checks
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          run_id="${{ steps.master-ci-run.outputs.run_id }}"
          repo="${{ github.repository }}"
          required_jobs=(
            security-lint
            test-backend-node
            test-frontend
            test-backend-ai
            test-mobile
          )

          for _ in $(seq 1 120); do
            payload="$(gh api "/repos/$repo/actions/runs/$run_id/jobs?per_page=100")"

            missing_jobs=0
            pending_jobs=0
            failed_jobs=()

            for job_name in "${required_jobs[@]}"; do
              job_status="$(printf '%s' "$payload" | jq -r --arg name "$job_name" '.jobs[] | select(.name == $name) | .status' | tail -n 1)"
              job_conclusion="$(printf '%s' "$payload" | jq -r --arg name "$job_name" '.jobs[] | select(.name == $name) | .conclusion' | tail -n 1)"

              if [ -z "$job_status" ]; then
                missing_jobs=1
                continue
              fi

              if [ "$job_status" != "completed" ]; then
                pending_jobs=1
                continue
              fi

              if [ "$job_conclusion" != "success" ]; then
                failed_jobs+=("$job_name:$job_conclusion")
              fi
            done

            if [ "${#failed_jobs[@]}" -gt 0 ]; then
              echo "Required master checks failed: ${failed_jobs[*]}"
              echo "exit_code=1" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$missing_jobs" -eq 0 ] && [ "$pending_jobs" -eq 0 ]; then
              echo "exit_code=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep 5
          done

          echo "Timed out while waiting for required master checks."
          echo "exit_code=1" >> "$GITHUB_OUTPUT"

      - name: Publish fast-forward branch-policy status
        if: ${{ steps.sync-strategy.outputs.mode == 'fast-forward' && steps.wait-master-checks.outputs.exit_code == '0' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          target_sha="${{ steps.sync-strategy.outputs.target_sha }}"
          target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/statuses/$target_sha" \
            -f context=branch-policy \
            -f state=success \
            -f description="Fast-forward sync from master into dev is allowed." \
            -f target_url="$target_url"

      - name: Configure fast-forward deploy key
        if: ${{ steps.sync-strategy.outputs.mode == 'fast-forward' && steps.wait-master-checks.outputs.exit_code == '0' }}
        env:
          DEV_SYNC_DEPLOY_KEY: ${{ secrets.DEV_SYNC_DEPLOY_KEY }}
        shell: bash
        run: |
          if [ -z "${DEV_SYNC_DEPLOY_KEY:-}" ]; then
            echo "DEV_SYNC_DEPLOY_KEY secret is required for fast-forward sync."
            exit 1
          fi

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$DEV_SYNC_DEPLOY_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan github.com >> "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

          git remote set-url origin "git@github.com:${{ github.repository }}.git"

      - name: Fast-forward dev to master
        if: ${{ steps.sync-strategy.outputs.mode == 'fast-forward' && steps.wait-master-checks.outputs.exit_code == '0' }}
        id: fast-forward
        shell: bash
        run: |
          target_sha="${{ steps.sync-strategy.outputs.target_sha }}"
          dev_sha="${{ steps.sync-strategy.outputs.dev_sha }}"

          if git push origin "$target_sha:refs/heads/dev"; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Fast-forward push to dev failed, likely because dev advanced before the sync completed."
          echo "result=fallback" >> "$GITHUB_OUTPUT"

      - name: Fail when master CI did not pass
        if: ${{ steps.sync-strategy.outputs.mode == 'fast-forward' && steps.wait-master-checks.outputs.exit_code != '0' }}
        shell: bash
        run: |
          echo "Required master checks did not pass for ${{ steps.sync-strategy.outputs.target_sha }}, so dev was not moved to the release SHA."
          exit 1

      - name: Prepare sync branch
        if: ${{ steps.sync-strategy.outputs.mode == 'pull-request' || steps.fast-forward.outputs.result == 'fallback' }}
        id: sync-branch
        shell: bash
        run: |
          git fetch origin dev master

          branch_name="sync/master-into-dev"

          git checkout -B "$branch_name" origin/dev
          # Fall back to a dedicated sync commit only when fast-forward is no longer possible.
          git merge --no-ff --no-edit origin/master
          git push origin "$branch_name" --force-with-lease

          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create or update sync PR
        if: ${{ steps.sync-strategy.outputs.mode == 'pull-request' || steps.fast-forward.outputs.result == 'fallback' }}
        id: sync-pr
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          pr_number="$(gh pr list \
            --base dev \
            --head "${{ steps.sync-branch.outputs.branch_name }}" \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [ -z "$pr_number" ]; then
            printf '%s\n' \
              '## Summary' \
              '- sync the latest master merge history back into dev' \
              '- keep the promotion flow `feature/* -> dev -> master` working without manual sync pull requests' \
              > /tmp/sync-pr-body.md

            pr_url="$(gh pr create \
              --base dev \
              --head "${{ steps.sync-branch.outputs.branch_name }}" \
              --title "Sync master into dev" \
              --body-file /tmp/sync-pr-body.md)"
            pr_number="${pr_url##*/}"
          fi

          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge for sync PR
        if: ${{ steps.sync-strategy.outputs.mode == 'pull-request' || steps.fast-forward.outputs.result == 'fallback' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ steps.sync-pr.outputs.number }}" --merge --auto --delete-branch

      - name: Kick sync PR required checks
        if: ${{ steps.sync-strategy.outputs.mode == 'pull-request' || steps.fast-forward.outputs.result == 'fallback' }}
        id: kick-checks
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh workflow run ci.yml \
            --ref "${{ steps.sync-branch.outputs.branch_name }}" \
            -f sync_pr_mode=true
          gh workflow run branch-policy.yml \
            --ref "${{ steps.sync-branch.outputs.branch_name }}" \
            -f base_branch=dev \
            -f head_branch="${{ steps.sync-branch.outputs.branch_name }}"

      - name: Discover dispatched sync runs
        if: ${{ steps.sync-strategy.outputs.mode == 'pull-request' || steps.fast-forward.outputs.result == 'fallback' }}
        id: dispatched-runs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          branch_name="${{ steps.sync-branch.outputs.branch_name }}"
          head_sha="${{ steps.sync-branch.outputs.head_sha }}"

          find_run_id() {
            local workflow="$1"

            for _ in $(seq 1 30); do
              run_id="$(gh run list \
                --workflow "$workflow" \
                --branch "$branch_name" \
                --event workflow_dispatch \
                --json databaseId,headSha \
                --jq '[.[] | select(.headSha == "'"$head_sha"'")] | sort_by(.databaseId) | last | .databaseId // empty')"

              if [ -n "$run_id" ]; then
                printf '%s' "$run_id"
                return 0
              fi

              sleep 5
            done

            return 1
          }

          ci_run_id="$(find_run_id ci.yml)"
          branch_policy_run_id="$(find_run_id branch-policy.yml)"

          echo "ci_run_id=$ci_run_id" >> "$GITHUB_OUTPUT"
          echo "branch_policy_run_id=$branch_policy_run_id" >> "$GITHUB_OUTPUT"

      - name: Mark sync PR statuses pending
        if: ${{ steps.sync-strategy.outputs.mode == 'pull-request' || steps.fast-forward.outputs.result == 'fallback' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          node .github/scripts/bridge-sync-pr-statuses.mjs \
            --run-id "${{ steps.dispatched-runs.outputs.ci_run_id }}" \
            --phase requested
          node .github/scripts/bridge-sync-pr-statuses.mjs \
            --run-id "${{ steps.dispatched-runs.outputs.branch_policy_run_id }}" \
            --phase requested

      - name: Wait for dispatched sync checks
        if: ${{ steps.sync-strategy.outputs.mode == 'pull-request' || steps.fast-forward.outputs.result == 'fallback' }}
        id: wait-sync-checks
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ci_exit_code=0
          branch_policy_exit_code=0

          gh run watch "${{ steps.dispatched-runs.outputs.ci_run_id }}" --exit-status || ci_exit_code=$?
          gh run watch "${{ steps.dispatched-runs.outputs.branch_policy_run_id }}" --exit-status || branch_policy_exit_code=$?

          echo "ci_exit_code=$ci_exit_code" >> "$GITHUB_OUTPUT"
          echo "branch_policy_exit_code=$branch_policy_exit_code" >> "$GITHUB_OUTPUT"

      - name: Bridge dispatched sync check results
        if: ${{ always() && (steps.sync-strategy.outputs.mode == 'pull-request' || steps.fast-forward.outputs.result == 'fallback') }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          node .github/scripts/bridge-sync-pr-statuses.mjs \
            --run-id "${{ steps.dispatched-runs.outputs.ci_run_id }}" \
            --phase completed
          node .github/scripts/bridge-sync-pr-statuses.mjs \
            --run-id "${{ steps.dispatched-runs.outputs.branch_policy_run_id }}" \
            --phase completed

      - name: Enforce dispatched sync check results
        if: ${{ steps.sync-strategy.outputs.mode == 'pull-request' || steps.fast-forward.outputs.result == 'fallback' }}
        shell: bash
        run: |
          if [ "${{ steps.wait-sync-checks.outputs.ci_exit_code }}" != "0" ] || [ "${{ steps.wait-sync-checks.outputs.branch_policy_exit_code }}" != "0" ]; then
            echo "One or more dispatched sync checks failed."
            exit 1
          fi
