name: Sync master into dev

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-master-into-dev:
    name: sync-master-into-dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare sync branch
        id: sync-branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin dev master

          if git merge-base --is-ancestor origin/master origin/dev; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch_name="sync/master-into-dev"

          git checkout -B "$branch_name" origin/dev
          git merge --no-edit origin/master
          git push origin "$branch_name" --force-with-lease

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"

      - name: Create or update sync PR
        if: ${{ steps.sync-branch.outputs.skip != 'true' }}
        id: sync-pr
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          pr_number="$(gh pr list \
            --base dev \
            --head "${{ steps.sync-branch.outputs.branch_name }}" \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [ -z "$pr_number" ]; then
            printf '%s\n' \
              '## Summary' \
              '- sync the latest master merge history back into dev' \
              '- keep the promotion flow `feature/* -> dev -> master` working without manual sync pull requests' \
              > /tmp/sync-pr-body.md

            pr_url="$(gh pr create \
              --base dev \
              --head "${{ steps.sync-branch.outputs.branch_name }}" \
              --title "Sync master into dev" \
              --body-file /tmp/sync-pr-body.md)"
            pr_number="${pr_url##*/}"
          fi

          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge for sync PR
        if: ${{ steps.sync-branch.outputs.skip != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ steps.sync-pr.outputs.number }}" --merge --auto --delete-branch
