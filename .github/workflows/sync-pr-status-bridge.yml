name: Sync PR Status Bridge

on:
  workflow_run:
    workflows:
      - CI
      - Branch Policy
    types:
      - requested
      - completed

permissions:
  actions: read
  contents: read
  statuses: write

jobs:
  bridge-required-statuses:
    name: bridge-required-statuses
    if: ${{ github.event.workflow_run.event == 'workflow_dispatch' && github.event.workflow_run.head_branch == 'sync/master-into-dev' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bridge dispatched checks into commit statuses
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node .github/scripts/bridge-sync-pr-statuses.mjs \
            --run-id "${{ github.event.workflow_run.id }}" \
            --phase "${{ github.event.action }}"
